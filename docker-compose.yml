services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xtract
      POSTGRES_PASSWORD: xtract
      POSTGRES_DB: xtract
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xtract"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://xtract:xtract@db:5432/xtract
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      API_KEY: ${API_KEY:-dev-secret-key}
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
